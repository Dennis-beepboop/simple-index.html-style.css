<!DOCTYPE html>
<html>
<head>
    <title>Dennis P. Ofilan - Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        nav a:hover {
            color: yellow;
        }
        section {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        img {
            display: block;
            margin: auto;
            border-radius: 10px;
        }
        .profile-img {
            width: 150px;
            border-radius: 50%;
        }
        .click-img {
            width: 100px;
        }
        table {
            border-collapse: collapse;
            width: 60%;
            margin: auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background: lightgray;
        }
        form {
            width: 60%;
            margin: auto;
            text-align: left;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px;
            background: #333;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<nav>
    <a href="#profile">Profile</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#social">Social</a>
    <a href="#contact">Contact</a>
</nav>

    <img src="profilepic.jfif" class="profile-img" alt="Profile Picture">

        </tr>

</html>
